<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAG Chat — SpringBootAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="index.html">
      <i class="fa-solid fa-brain me-2"></i>SpringBootAI
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item"><a class="nav-link active" href="index.html"><i class="fa-solid fa-comments me-1"></i>Chat</a></li>
        <li class="nav-item"><a class="nav-link" href="admin.html"><i class="fa-solid fa-database me-1"></i>Admin</a></li>
        <li class="nav-item">
          <a class="nav-link" href="http://localhost:8081/swagger-ui.html" target="_blank">
            <i class="fa-solid fa-book-open me-1"></i>Swagger
          </a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm" data-bs-toggle="modal" data-bs-target="#settings-modal"
                style="color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:8px;font-size:.78rem">
          <i class="fa-solid fa-gear me-1"></i>Impostazioni
        </button>
        <div id="health-badge" class="checking">
          <span id="health-dot"></span>
          <i class="fa-solid fa-server" style="font-size:.7rem"></i>
          <span id="health-label">…</span>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ── Modal: impostazioni ── -->
<div class="modal fade" id="settings-modal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background:var(--surface);border:1px solid var(--border)">
      <div class="modal-header" style="border-bottom:1px solid var(--border)">
        <h5 class="modal-title" style="color:var(--text)"><i class="fa-solid fa-gear me-2" style="color:var(--accent)"></i>Impostazioni client</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form id="settings-form">
        <div class="modal-body" style="display:flex;flex-direction:column;gap:1rem">
          <div>
            <label class="form-label" style="font-size:.82rem;color:var(--text-muted)">API Base URL</label>
            <input id="settings-api-base" type="url" class="form-control form-control-dark"
                   placeholder="http://localhost:8081">
          </div>
          <div>
            <label class="form-label" style="font-size:.82rem;color:var(--text-muted)">API Key <span style="font-weight:400">(header X-Api-Key)</span></label>
            <input id="settings-api-key" type="text" class="form-control form-control-dark"
                   placeholder="lascia vuoto se API_KEY non è configurata">
            <div style="font-size:.73rem;color:var(--text-muted);margin-top:.4rem">
              Salvata in localStorage — non inviata ad altri server.
            </div>
          </div>
        </div>
        <div class="modal-footer" style="border-top:1px solid var(--border)">
          <button type="button" class="btn btn-sm" data-bs-dismiss="modal"
                  style="color:var(--text-muted);border:1px solid var(--border);border-radius:8px">Annulla</button>
          <button type="submit" class="btn-accent btn btn-sm">
            <i class="fa-solid fa-floppy-disk me-1"></i>Salva e ricarica
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ── Chat ── -->
<div class="chat-wrapper">

  <div class="chat-toolbar">
    <div class="mode-toggle">
      <span>Modalità</span>
      <div class="form-check form-switch mb-0">
        <input class="form-check-input" type="checkbox" id="rag-toggle" checked>
      </div>
      <span id="mode-badge" class="mode-badge rag">RAG</span>
    </div>
    <div class="topk-control" id="topk-wrap">
      <i class="fa-solid fa-layer-group" title="Numero di chunk da recuperare"></i>
      <span>topK</span>
      <input type="range" id="topk-slider" min="1" max="10" value="4">
      <span id="topk-value">4</span>
      <i class="fa-solid fa-folder-open ms-2" title="Collection (namespace)"></i>
      <input type="text" id="collection-input" placeholder="collection…"
             style="width:110px;background:var(--input-bg);border:1px solid var(--border);border-radius:7px;padding:.2rem .5rem;font-size:.78rem;color:var(--text);outline:none">
    </div>
    <div class="flex-grow-1"></div>

    <!-- session badge -->
    <div class="session-badge" title="ID sessione corrente">
      <i class="fa-solid fa-circle-nodes"></i>
      <span id="session-label">…</span>
    </div>

    <button id="new-session-btn" class="btn btn-sm" title="Inizia una nuova conversazione"
            style="color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:8px;font-size:.8rem">
      <i class="fa-solid fa-rotate me-1"></i>Nuova sessione
    </button>

    <button id="clear-btn" class="btn btn-sm" style="color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:8px;font-size:.8rem">
      <i class="fa-solid fa-trash-can me-1"></i>Pulisci
    </button>
  </div>

  <div id="messages"></div>

  <div class="chat-input-area">
    <div class="chat-input-wrap">
      <textarea id="chat-input" rows="1" placeholder="Scrivi una domanda… (Invio per inviare, Shift+Invio per a capo)"></textarea>
      <button id="send-btn" title="Invia (Invio)">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
    <div class="mt-2 text-center" style="font-size:.72rem;color:var(--text-muted)">
      <i class="fa-solid fa-lock me-1"></i>Tutto gira in locale — nessun dato inviato al cloud
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/health.js"></script>
<script src="js/chat.js"></script>
<script>
  // settings modal — pre-popola e salva
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('settings-api-base').value = CONFIG.API_BASE;
    document.getElementById('settings-api-key').value  = CONFIG.API_KEY;
    document.getElementById('settings-form').addEventListener('submit', e => {
      e.preventDefault();
      saveConfig(
        document.getElementById('settings-api-base').value.trim(),
        document.getElementById('settings-api-key').value.trim()
      );
    });
  });
</script>
</body>
</html>
