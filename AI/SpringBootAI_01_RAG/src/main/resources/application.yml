server:
    port: 8081

spring:
  application:
    name: SpringBootAI

  # ── Database (PostgreSQL + pgvector) ─────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/vectordb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none           # lo schema vector_store è gestito da Spring AI
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Upload file ───────────────────────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  # ── Spring AI ─────────────────────────────────────────────────────────────────
  ai:

    # Ollama (chat + embedding devono girare sullo stesso server)
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2          # modello chat: cambiare se necessario
      embedding:
        options:
          model: nomic-embed-text  # modello embedding (768 dim)

    # PGVector store
    vectorstore:
      pgvector:
        initialize-schema: true    # crea automaticamente la tabella vector_store
        dimensions: 768            # deve corrispondere al modello embedding
        index-type: hnsw           # HNSW per ricerche veloci
        distance-type: cosine_distance

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.example.springbootai: DEBUG
    org.springframework.ai: INFO
